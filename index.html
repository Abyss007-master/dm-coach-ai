<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Coach AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .chat-wrapper {
      width: 100%;
      max-width: 720px;
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      height: 90vh;
      max-height: 700px;
    }
    .chat-header {
      background: linear-gradient(135deg, #6c3de8, #3d8bff);
      padding: 20px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .coach-avatar {
      width: 46px; height: 46px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 22px;
    }
    .coach-info h2 { color: #fff; font-size: 18px; font-weight: 700; }
    .coach-info p { color: rgba(255,255,255,0.75); font-size: 12px; margin-top: 2px; }
    .online-dot {
      width: 8px; height: 8px;
      background: #4ade80;
      border-radius: 50%;
      display: inline-block;
      margin-right: 5px;
    }
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .message { display: flex; gap: 10px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }
    .msg-avatar {
      width: 34px; height: 34px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px; flex-shrink: 0;
    }
    .bot .msg-avatar { background: linear-gradient(135deg, #6c3de8, #3d8bff); }
    .user .msg-avatar { background: #2a2a2a; }
    .msg-bubble {
      padding: 12px 16px;
      border-radius: 18px;
      font-size: 14px;
      line-height: 1.6;
    }
    .bot .msg-bubble {
      background: #252525;
      color: #e0e0e0;
      border-bottom-left-radius: 4px;
    }
    .user .msg-bubble {
      background: linear-gradient(135deg, #6c3de8, #3d8bff);
      color: #fff;
      border-bottom-right-radius: 4px;
    }
    .typing-indicator {
      display: none;
      align-self: flex-start;
      background: #252525;
      border-radius: 18px;
      padding: 12px 18px;
      border-bottom-left-radius: 4px;
      margin: 0 20px;
    }
    .typing-indicator span {
      display: inline-block;
      width: 8px; height: 8px;
      background: #888;
      border-radius: 50%;
      animation: bounce 1.2s infinite;
      margin: 0 2px;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-6px); }
    }
    .quick-questions {
      padding: 0 20px 12px;
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
    }
    .quick-btn {
      background: #252525;
      color: #a0a0a0;
      border: 1px solid #333;
      border-radius: 20px;
      padding: 6px 14px;
      font-size: 12px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .quick-btn:hover { background: #6c3de8; color: #fff; border-color: #6c3de8; }
    .chat-input-area {
      padding: 16px 20px;
      background: #141414;
      display: flex;
      gap: 10px;
      align-items: flex-end;
      border-top: 1px solid #222;
    }
    #userInput {
      flex: 1;
      background: #252525;
      border: 1px solid #333;
      border-radius: 12px;
      padding: 12px 16px;
      color: #e0e0e0;
      font-size: 14px;
      resize: none;
      min-height: 46px;
      max-height: 120px;
      outline: none;
      font-family: inherit;
      transition: border 0.2s;
    }
    #userInput:focus { border-color: #6c3de8; }
    #userInput::placeholder { color: #555; }
    #sendBtn {
      width: 46px; height: 46px;
      background: linear-gradient(135deg, #6c3de8, #3d8bff);
      border: none;
      border-radius: 12px;
      color: #fff;
      font-size: 18px;
      cursor: pointer;
      flex-shrink: 0;
      transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
  <div class="chat-wrapper">
    <div class="chat-header">
      <div class="coach-avatar">🎯</div>
      <div class="coach-info">
        <h2>DM Coach AI</h2>
        <p><span class="online-dot"></span>Your Digital Marketing Expert</p>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages">
      <div class="message bot">
        <div class="msg-avatar">🎯</div>
        <div class="msg-bubble">Hey! I'm your <strong>Digital Marketing Coach</strong>. Ask me anything about SEO, Google Ads, Meta Ads, Content Marketing, Social Media, or growing your brand online. I'm here to help! 🚀</div>
      </div>
    </div>
    <div class="typing-indicator" id="typingIndicator">
      <span></span><span></span><span></span>
    </div>
    <div class="quick-questions">
      <button class="quick-btn" onclick="askQuick('How do I start with SEO?')">SEO Basics</button>
      <button class="quick-btn" onclick="askQuick('How to run Google Ads?')">Google Ads</button>
      <button class="quick-btn" onclick="askQuick('Best content marketing tips?')">Content Tips</button>
      <button class="quick-btn" onclick="askQuick('How to grow on Instagram?')">Instagram Growth</button>
    </div>
    <div class="chat-input-area">
      <textarea id="userInput" placeholder="Ask your digital marketing question..." rows="1"></textarea>
      <button id="sendBtn" onclick="sendMessage()">&#10148;</button>
    </div>
  </div>
  <script>
    const API_URL = window.location.origin + '/api/coach';
    const chatMessages = document.getElementById('chatMessages');
    const userInput = document.getElementById('userInput');
    const sendBtn = document.getElementById('sendBtn');
    const typingIndicator = document.getElementById('typingIndicator');

    userInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });

    function askQuick(q) {
      userInput.value = q;
      sendMessage();
    }

    function addMessage(text, role) {
      const msg = document.createElement('div');
      msg.className = 'message ' + role;
      const avatar = document.createElement('div');
      avatar.className = 'msg-avatar';
      avatar.textContent = role === 'bot' ? '🎯' : '👤';
      const bubble = document.createElement('div');
      bubble.className = 'msg-bubble';
      bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>');
      msg.appendChild(avatar);
      msg.appendChild(bubble);
      chatMessages.appendChild(msg);
      chatMessages.scrollTop = chatMessages.scrollHeight;
    }

    async function sendMessage() {
      const message = userInput.value.trim();
      if (!message) return;
      userInput.value = '';
      sendBtn.disabled = true;
      addMessage(message, 'user');
      typingIndicator.style.display = 'flex';
      chatMessages.scrollTop = chatMessages.scrollHeight;
      try {
        const response = await fetch(API_URL, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message })
        });
        const data = await response.json();
        typingIndicator.style.display = 'none';
        if (data.reply) addMessage(data.reply, 'bot');
        else addMessage('Error: ' + (data.error || 'Unknown error'), 'bot');
      } catch (err) {
        typingIndicator.style.display = 'none';
        addMessage('Error: ' + err.message, 'bot');
      }
      sendBtn.disabled = false;
      userInput.focus();
    }
  </script>
</body>
</html>
