<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DM Coach AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', sans-serif;
            background: #0f0f0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 16px;
        }
        .chat-wrapper {
            width: 100%;
            max-width: 720px;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5);
            display: flex;
            flex-direction: column;
            height: 92vh;
            max-height: 760px;
        }
        /* CHAT HEADER */
        .chat-header {
            padding: 14px 20px;
            background: rgba(30, 30, 40, 0.8);
            border-bottom: 1px solid rgba(138, 43, 226, 0.2);
            display: flex;
            align-items: center;
            gap: 14px;
        }
        .coach-avatar {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #8a2be2 0%, #6a0dad 100%);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            flex-shrink: 0;
        }
        .coach-info h2 {
            font-size: 18px;
            color: #fff;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .online-dot {
            width: 8px;
            height: 8px;
            background: #10b981;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        .coach-info p {
            font-size: 13px;
            color: #888;
            margin-top: 2px;
        }
        /* CHAT MESSAGES */
        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 16px 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
            scrollbar-width: thin;
            scrollbar-color: #8a2be2 #1a1a1a;
        }
        .chat-messages::-webkit-scrollbar { width: 6px; }
        .chat-messages::-webkit-scrollbar-thumb { background: #8a2be2; border-radius: 3px; }
        .message {
            display: flex;
            gap: 12px;
            max-width: 85%;
            animation: message-in 0.3s ease;
        }
        @keyframes message-in {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .message.user { align-self: flex-end; flex-direction: row-reverse; }
        .message.bot  { align-self: flex-start; }
        .msg-avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            flex-shrink: 0;
        }
        .message.user .msg-avatar { background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%); }
        .message.bot  .msg-avatar { background: linear-gradient(135deg, #8a2be2 0%, #6a0dad 100%); }
        .msg-bubble {
            background: rgba(30, 30, 40, 0.9);
            border: 1px solid rgba(138, 43, 226, 0.2);
            border-radius: 18px;
            padding: 12px 16px;
            font-size: 14px;
            line-height: 1.5;
            color: #e5e5e5;
        }
        .message.user .msg-bubble {
            background: linear-gradient(135deg, #8a2be2 0%, #6a0dad 100%);
            border: none;
            color: #fff;
        }
        .msg-bubble strong { color: #c084fc; }
        .message.user .msg-bubble strong { color: #ddd; }
        .typing-indicator {
            display: none;
            padding: 8px 20px;
            gap: 4px;
        }
        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: #8a2be2;
            border-radius: 50%;
            animation: typing-bounce 1.4s infinite ease-in-out;
        }
        .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
        .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing-bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
        /* QUICK QUESTIONS */
        .quick-questions {
            padding: 12px 20px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
            background: rgba(20, 20, 30, 0.5);
            border-top: 1px solid rgba(138, 43, 226, 0.1);
        }
        .quick-btn {
            padding: 8px 16px;
            background: rgba(138, 43, 226, 0.1);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 20px;
            font-size: 13px;
            color: #c084fc;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }
        .quick-btn:hover {
            background: rgba(138, 43, 226, 0.2);
            border-color: #8a2be2;
        }
        /* INPUT AREA */
        .chat-input-area {
            padding: 14px 20px;
            background: rgba(20, 20, 30, 0.8);
            border-top: 1px solid rgba(138, 43, 226, 0.2);
            display: flex;
            gap: 12px;
            align-items: flex-end;
        }
        .chat-input-area textarea {
            flex: 1;
            background: rgba(30, 30, 40, 0.8);
            border: 1px solid rgba(138, 43, 226, 0.3);
            border-radius: 16px;
            padding: 12px 16px;
            font-size: 14px;
            color: #e5e5e5;
            font-family: inherit;
            resize: none;
            max-height: 120px;
            min-height: 48px;
            outline: none;
            transition: all 0.3s ease;
        }
        .chat-input-area textarea:focus {
            border-color: #8a2be2;
            box-shadow: 0 0 15px rgba(138, 43, 226, 0.2);
        }
        .chat-input-area textarea::placeholder { color: #666; }
        .chat-input-area button {
            width: 48px;
            height: 48px;
            background: linear-gradient(135deg, #8a2be2 0%, #6a0dad 100%);
            border: none;
            border-radius: 50%;
            color: white;
            font-size: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            flex-shrink: 0;
        }
        .chat-input-area button:disabled { background: #444; cursor: not-allowed; opacity: 0.5; }
        .chat-input-area button:hover:not(:disabled) {
            transform: scale(1.1);
            box-shadow: 0 4px 20px rgba(138, 43, 226, 0.4);
        }
    </style>
</head>
<body>
    <div class="chat-wrapper">
        <!-- CHAT HEADER -->
        <div class="chat-header">
            <div class="coach-avatar">&#127919;</div>
            <div class="coach-info">
                <h2>DM Coach AI <span class="online-dot"></span></h2>
                <p>Your Digital Marketing Expert</p>
            </div>
        </div>

        <!-- CHAT MESSAGES -->
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="msg-avatar">&#127919;</div>
                <div class="msg-bubble">Hey! I'm your <strong>Digital Marketing Coach</strong>. Ask me anything about SEO, Google Ads, Meta Ads, Content Marketing, Social Media, or growing your brand online. I'm here to help!</div>
            </div>
        </div>

        <!-- TYPING INDICATOR -->
        <div class="typing-indicator" id="typingIndicator" style="display:none;">
            <span></span><span></span><span></span>
        </div>

        <!-- QUICK QUESTIONS -->
        <div class="quick-questions">
            <button class="quick-btn" onclick="askQuick('SEO Basics')">SEO Basics</button>
            <button class="quick-btn" onclick="askQuick('Google Ads')">Google Ads</button>
            <button class="quick-btn" onclick="askQuick('Content Tips')">Content Tips</button>
            <button class="quick-btn" onclick="askQuick('Instagram Growth')">Instagram Growth</button>
        </div>

        <!-- INPUT AREA -->
        <div class="chat-input-area">
            <textarea id="userInput" placeholder="Ask about SEO, Google Ads, social media..." rows="1"></textarea>
            <button id="sendBtn" disabled>&#10151;</button>
        </div>
    </div>

    <script>
        const API_URL = window.location.origin + '/api/coach';

        const chatMessages = document.getElementById('chatMessages');
        const userInput = document.getElementById('userInput');
        const sendBtn = document.getElementById('sendBtn');
        const typingIndicator = document.getElementById('typingIndicator');

        function addMessage(text, sender) {
            const msg = document.createElement('div');
            msg.className = 'message ' + sender;
            const avatar = sender === 'user' ? '&#128100;' : '&#127919;';
            msg.innerHTML = '<div class="msg-avatar">' + avatar + '</div><div class="msg-bubble">' + text + '</div>';
            chatMessages.appendChild(msg);
            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        async function sendMessage(message) {
            if (!message.trim()) return;
            addMessage(message, 'user');
            userInput.value = '';
            userInput.style.height = 'auto';
            sendBtn.disabled = true;
            typingIndicator.style.display = 'flex';
            chatMessages.scrollTop = chatMessages.scrollHeight;
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ message })
                });
                const data = await response.json();
                typingIndicator.style.display = 'none';
                if (data.reply) {
                    addMessage(data.reply, 'bot');
                } else {
                    addMessage('Error: ' + (data.error || 'Unknown error'), 'bot');
                }
            } catch (err) {
                typingIndicator.style.display = 'none';
                addMessage('Error: ' + err.message, 'bot');
            }
        }

        function askQuick(question) {
            sendMessage(question);
        }

        userInput.addEventListener('input', function() {
            userInput.style.height = 'auto';
            userInput.style.height = (userInput.scrollHeight) + 'px';
            sendBtn.disabled = !this.value.trim();
        });

        userInput.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage(this.value);
            }
        });

        sendBtn.addEventListener('click', function() {
            sendMessage(userInput.value);
        });

        setTimeout(() => userInput.focus(), 300);
    </script>
</body>
</html>
