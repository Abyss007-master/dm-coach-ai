<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DM Coach AI</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f0f0f;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }
    .chat-wrapper {
      width: 100%;
      max-width: 720px;
      background: #1a1a1a;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 40px rgba(0,0,0,0.5);
      display: flex;
      flex-direction: column;
      height: 92vh;
      max-height: 760px;
    }
    /* CHARACTER SECTION */
    .character-section {
      background: linear-gradient(180deg, #0d0d1a 0%, #1a1a2e 100%);
      padding: 16px 20px 0;
      display: flex;
      align-items: flex-end;
      justify-content: center;
      gap: 16px;
      position: relative;
      overflow: hidden;
    }
    .character-bg {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 40px;
      background: linear-gradient(135deg, #6c3de8, #3d8bff);
      border-radius: 0;
    }
    .character-wrap {
      position: relative;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    .character-svg {
      width: 90px;
      height: 130px;
      filter: drop-shadow(0 4px 16px rgba(108,61,232,0.5));
      transition: transform 0.3s;
    }
    .character-svg.talking {
      animation: talk-bounce 0.4s ease-in-out infinite alternate;
    }
    @keyframes talk-bounce {
      0% { transform: translateY(0px) rotate(-1deg); }
      100% { transform: translateY(-6px) rotate(1deg); }
    }
    .speech-bubble {
      position: relative;
      background: #ffffff;
      color: #1a1a2e;
      font-size: 12px;
      font-weight: 600;
      padding: 8px 14px;
      border-radius: 16px;
      max-width: 200px;
      text-align: center;
      margin-bottom: 12px;
      z-index: 2;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      line-height: 1.4;
    }
    .speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -8px;
      left: 50%;
      transform: translateX(-50%);
      width: 0; height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 8px solid #ffffff;
    }
    /* HEADER */
    .chat-header {
      background: linear-gradient(135deg, #6c3de8, #3d8bff);
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 14px;
    }
    .coach-avatar {
      width: 40px; height: 40px;
      background: rgba(255,255,255,0.2);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .coach-info h2 { color: #fff; font-size: 16px; font-weight: 700; }
    .coach-info p { color: rgba(255,255,255,0.75); font-size: 11px; margin-top: 2px; }
    .online-dot { width: 8px; height: 8px; background: #4ade80; border-radius: 50%; display: inline-block; margin-right: 5px; }
    /* MESSAGES */
    .chat-messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      scrollbar-width: thin;
      scrollbar-color: #333 transparent;
    }
    .message { display: flex; gap: 10px; max-width: 85%; }
    .message.user { align-self: flex-end; flex-direction: row-reverse; }
    .message.bot { align-self: flex-start; }
    .msg-avatar {
      width: 32px; height: 32px;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 15px; flex-shrink: 0;
    }
    .bot .msg-avatar { background: linear-gradient(135deg, #6c3de8, #3d8bff); }
    .user .msg-avatar { background: #2a2a2a; }
    .msg-bubble { padding: 10px 14px; border-radius: 16px; font-size: 13px; line-height: 1.6; }
    .bot .msg-bubble { background: #252525; color: #e0e0e0; border-bottom-left-radius: 4px; }
    .user .msg-bubble { background: linear-gradient(135deg, #6c3de8, #3d8bff); color: #fff; border-bottom-right-radius: 4px; }
    .typing-indicator {
      display: none; align-self: flex-start;
      background: #252525; border-radius: 16px;
      padding: 10px 16px; border-bottom-left-radius: 4px;
    }
    .typing-indicator span {
      display: inline-block; width: 7px; height: 7px;
      background: #888; border-radius: 50%;
      animation: bounce 1.2s infinite; margin: 0 2px;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); }
      30% { transform: translateY(-5px); }
    }
    .quick-questions { padding: 0 16px 10px; display: flex; gap: 8px; flex-wrap: wrap; }
    .quick-btn {
      background: #252525; color: #a0a0a0;
      border: 1px solid #333; border-radius: 20px;
      padding: 5px 12px; font-size: 11px; cursor: pointer;
      transition: all 0.2s; white-space: nowrap;
    }
    .quick-btn:hover { background: #6c3de8; color: #fff; border-color: #6c3de8; }
    .chat-input-area {
      padding: 14px 18px;
      background: #141414;
      display: flex; gap: 10px; align-items: flex-end;
      border-top: 1px solid #222;
    }
    #userInput {
      flex: 1; background: #252525; border: 1px solid #333;
      border-radius: 12px; padding: 10px 14px;
      color: #e0e0e0; font-size: 13px; resize: none;
      min-height: 44px; max-height: 100px; outline: none;
      font-family: inherit; transition: border 0.2s;
    }
    #userInput:focus { border-color: #6c3de8; }
    #userInput::placeholder { color: #555; }
    #sendBtn {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, #6c3de8, #3d8bff);
      border: none; border-radius: 12px; color: #fff;
      font-size: 17px; cursor: pointer; flex-shrink: 0;
      transition: opacity 0.2s;
      display: flex; align-items: center; justify-content: center;
    }
    #sendBtn:hover { opacity: 0.85; }
    #sendBtn:disabled { opacity: 0.4; cursor: not-allowed; }
  </style>
</head>
<body>
<div class="chat-wrapper">

  <!-- CHARACTER SECTION -->
  <div class="character-section">
    <div class="character-wrap">
      <div class="speech-bubble" id="speechBubble">Ask me anything about Digital Marketing!</div>
      <svg class="character-svg" id="coachCharacter" viewBox="0 0 100 150" xmlns="http://www.w3.org/2000/svg">
        <!-- Body / Suit -->
        <rect x="25" y="85" width="50" height="55" rx="8" fill="#2d2d6b"/>
        <!-- Shirt / Tie -->
        <rect x="40" y="85" width="20" height="55" fill="#1e1e4a"/>
        <polygon points="50,88 46,100 50,105 54,100" fill="#e53e3e"/>
        <!-- Neck -->
        <rect x="43" y="72" width="14" height="16" rx="4" fill="#f4a261"/>
        <!-- Head -->
        <ellipse cx="50" cy="58" rx="22" ry="22" fill="#f4a261"/>
        <!-- Hair -->
        <ellipse cx="50" cy="38" rx="22" ry="10" fill="#2d1b00"/>
        <rect x="28" y="38" width="44" height="10" rx="4" fill="#2d1b00"/>
        <!-- Eyes -->
        <ellipse cx="42" cy="56" rx="4" ry="4.5" fill="white"/>
        <ellipse cx="58" cy="56" rx="4" ry="4.5" fill="white"/>
        <circle cx="43" cy="57" r="2.5" fill="#1a1a1a" id="leftEye"/>
        <circle cx="59" cy="57" r="2.5" fill="#1a1a1a" id="rightEye"/>
        <!-- Eyebrows -->
        <path d="M38 50 Q42 47 46 50" stroke="#2d1b00" stroke-width="2" fill="none" stroke-linecap="round"/>
        <path d="M54 50 Q58 47 62 50" stroke="#2d1b00" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Nose -->
        <ellipse cx="50" cy="62" rx="2.5" ry="2" fill="#e07b3a"/>
        <!-- Mouth (changes when talking) -->
        <path id="mouthPath" d="M44 70 Q50 75 56 70" stroke="#c0392b" stroke-width="2" fill="none" stroke-linecap="round"/>
        <!-- Ears -->
        <ellipse cx="28" cy="58" rx="5" ry="7" fill="#f4a261"/>
        <ellipse cx="72" cy="58" rx="5" ry="7" fill="#f4a261"/>
        <!-- Arms -->
        <rect x="10" y="88" width="16" height="36" rx="8" fill="#2d2d6b"/>
        <rect x="74" y="88" width="16" height="36" rx="8" fill="#2d2d6b"/>
        <!-- Hands -->
        <ellipse cx="18" cy="128" rx="8" ry="6" fill="#f4a261"/>
        <ellipse cx="82" cy="128" rx="8" ry="6" fill="#f4a261"/>
        <!-- Laptop in hand -->
        <rect x="60" y="112" width="26" height="18" rx="3" fill="#333"/>
        <rect x="62" y="114" width="22" height="13" rx="2" fill="#4a9eff"/>
        <rect x="58" y="129" width="30" height="3" rx="1.5" fill="#555"/>
        <!-- Collar / lapels -->
        <polygon points="40,85 50,95 40,105" fill="#3a3a8a"/>
        <polygon points="60,85 50,95 60,105" fill="#3a3a8a"/>
      </svg>
    </div>
    <div class="character-bg"></div>
  </div>

  <!-- HEADER -->
  <div class="chat-header">
    <div class="coach-avatar">🎯</div>
    <div class="coach-info">
      <h2>DM Coach AI</h2>
      <p><span class="online-dot"></span>Your Digital Marketing Expert</p>
    </div>
  </div>

  <!-- MESSAGES -->
  <div class="chat-messages" id="chatMessages">
    <div class="message bot">
      <div class="msg-avatar">🎯</div>
      <div class="msg-bubble">Hey! I'm your <strong>Digital Marketing Coach</strong>. Ask me anything about SEO, Google Ads, Meta Ads, Content Marketing, Social Media, or growing your brand online. I'm here to help! 🚀</div>
    </div>
  </div>

  <div class="typing-indicator" id="typingIndicator">
    <span></span><span></span><span></span>
  </div>

  <!-- QUICK QUESTIONS -->
  <div class="quick-questions">
    <button class="quick-btn" onclick="askQuick('SEO Basics')">SEO Basics</button>
    <button class="quick-btn" onclick="askQuick('Google Ads tips')">Google Ads</button>
    <button class="quick-btn" onclick="askQuick('Content Marketing tips')">Content Tips</button>
    <button class="quick-btn" onclick="askQuick('Instagram Growth strategies')">Instagram Growth</button>
  </div>

  <!-- INPUT -->
  <div class="chat-input-area">
    <textarea id="userInput" placeholder="Ask your digital marketing question..." rows="1"></textarea>
    <button id="sendBtn">&#10148;</button>
  </div>

</div>

<script>
  const API_URL = window.location.origin + '/api/coach';
  const chatMessages = document.getElementById('chatMessages');
  const userInput = document.getElementById('userInput');
  const sendBtn = document.getElementById('sendBtn');
  const typingIndicator = document.getElementById('typingIndicator');
  const coachCharacter = document.getElementById('coachCharacter');
  const speechBubble = document.getElementById('speechBubble');
  const mouthPath = document.getElementById('mouthPath');

  const idlePhrases = [
    'Ask me anything about Digital Marketing!',
    'Need SEO tips? I got you!',
    'Let me help grow your brand!',
    'Google Ads expert at your service!',
    'Social Media strategy? Ask away!'
  ];

  let idleTimer;
  function startIdleCycle() {
    clearInterval(idleTimer);
    let i = 0;
    idleTimer = setInterval(() => {
      i = (i + 1) % idlePhrases.length;
      speechBubble.textContent = idlePhrases[i];
    }, 4000);
  }
  startIdleCycle();

  function setTalking(active) {
    if (active) {
      coachCharacter.classList.add('talking');
      mouthPath.setAttribute('d', 'M44 68 Q50 76 56 68');
      speechBubble.textContent = 'Let me think...';
      clearInterval(idleTimer);
    } else {
      coachCharacter.classList.remove('talking');
      mouthPath.setAttribute('d', 'M44 70 Q50 75 56 70');
      speechBubble.textContent = 'Hope that helps! Ask me more!';
      setTimeout(startIdleCycle, 3000);
    }
  }

  userInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });

  function askQuick(q) { userInput.value = q; sendMessage(); }

  function addMessage(text, role) {
    const msg = document.createElement('div');
    msg.className = 'message ' + role;
    const avatar = document.createElement('div');
    avatar.className = 'msg-avatar';
    avatar.textContent = role === 'bot' ? '🎯' : '👤';
    const bubble = document.createElement('div');
    bubble.className = 'msg-bubble';
    bubble.innerHTML = text.replace(/\n/g, '<br>').replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>');
    msg.appendChild(avatar);
    msg.appendChild(bubble);
    chatMessages.appendChild(msg);
    chatMessages.scrollTop = chatMessages.scrollHeight;
  }

  async function sendMessage() {
    const message = userInput.value.trim();
    if (!message) return;
    userInput.value = '';
    sendBtn.disabled = true;
    addMessage(message, 'user');
    typingIndicator.style.display = 'flex';
    chatMessages.scrollTop = chatMessages.scrollHeight;
    setTalking(true);
    try {
      const response = await fetch(API_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message })
      });
      const data = await response.json();
      typingIndicator.style.display = 'none';
      if (data.reply) addMessage(data.reply, 'bot');
      else addMessage('Error: ' + (data.error || 'Unknown error'), 'bot');
    } catch (err) {
      typingIndicator.style.display = 'none';
      addMessage('Error: ' + err.message, 'bot');
    }
    setTalking(false);
    sendBtn.disabled = false;
    userInput.focus();
  }
</script>
</body>
</html>
